<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MergeCube AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="app.js"></script>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial;
}

#panel{
    position:fixed;
    top:10px;
    left:10px;
    z-index:999;
    background:white;
    padding:10px;
    border-radius:10px;
}

</style>
</head>

<body>
<div id="panel">
      <input type="file" id="archivo" accept=".glb">
</div>

<a-scene mindar-image="imageTargetSrc: mergecube.mind;" embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false" color-space="sRGB" renderer="colorManagement:true; physicallyCorrectLights:true">

<a-camera position="0 0 0" look-controls="enabled:false">
</a-camera>

<a-entity mindar-image-target="targetIndex:0">
<a-gltf-model id="visor" position="0 0 0" rotation="0 0 0" scale="0.1 0.1 0.1" visible="false">
</a-gltf-model>

</a-entity>
</a-scene>

</body>

</html>
